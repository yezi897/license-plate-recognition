<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", "SimHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#111827" font-size="20" font-weight="600">License Plate Recognition System Architecture</text>
  <text x="480" y="56" text-anchor="middle" fill="#6b7280" font-size="13">ESP32-S3 + OV2640 | Flask Server | Baidu Cloud OCR</text>

  <!-- ==================== Layer 1: Browser Frontend ==================== -->
  <rect x="40" y="75" width="880" height="110" rx="10" fill="#eff6ff" fill-opacity="0.3" stroke="#bfdbfe" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="56" y="92" fill="#2563eb" font-size="10" font-weight="600" letter-spacing="0.06em">BROWSER FRONTEND</text>

  <!-- Web Dashboard -->
  <rect x="70" y="100" width="160" height="70" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="70" y="100" width="160" height="18" rx="6" fill="#f3f4f6"/>
  <rect x="70" y="112" width="160" height="6" fill="#f3f4f6"/>
  <circle cx="82" cy="109" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="94" cy="109" r="4" fill="#f59e0b" opacity="0.8"/>
  <circle cx="106" cy="109" r="4" fill="#10b981" opacity="0.8"/>
  <text x="150" y="148" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Web Dashboard</text>
  <text x="150" y="162" text-anchor="middle" fill="#6b7280" font-size="11">index.html + app.js</text>

  <!-- Live Video -->
  <rect x="280" y="100" width="140" height="70" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="350" y="130" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Live Video</text>
  <text x="350" y="146" text-anchor="middle" fill="#6b7280" font-size="11">Stream Polling</text>
  <text x="350" y="162" text-anchor="middle" fill="#9333ea" font-size="10">/api/stream/frame</text>

  <!-- Recognition -->
  <rect x="470" y="100" width="140" height="70" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="540" y="130" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Recognition</text>
  <text x="540" y="146" text-anchor="middle" fill="#6b7280" font-size="11">Result Display</text>
  <text x="540" y="162" text-anchor="middle" fill="#16a34a" font-size="10">Plate + Color</text>

  <!-- History -->
  <rect x="660" y="100" width="140" height="70" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="730" y="130" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">History</text>
  <text x="730" y="146" text-anchor="middle" fill="#6b7280" font-size="11">Records + Stats</text>
  <text x="730" y="162" text-anchor="middle" fill="#ea580c" font-size="10">Pagination</text>

  <!-- Settings -->
  <rect x="850" y="100" width="50" height="70" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="875" y="140" text-anchor="middle" fill="#ea580c" font-size="18">&#9881;</text>
  <text x="875" y="158" text-anchor="middle" fill="#6b7280" font-size="9">Config</text>

  <!-- Arrow: Frontend -> Server -->
  <line x1="480" y1="185" x2="480" y2="215" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="490" y="204" fill="#2563eb" font-size="10">HTTP REST API</text>

  <!-- ==================== Layer 2: Flask Server ==================== -->
  <rect x="40" y="215" width="880" height="200" rx="10" fill="#f0fdf4" fill-opacity="0.3" stroke="#bbf7d0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="56" y="232" fill="#16a34a" font-size="10" font-weight="600" letter-spacing="0.06em">FLASK SERVER (Python)</text>

  <!-- Flask App -->
  <rect x="70" y="245" width="150" height="70" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="145" y="275" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Flask App</text>
  <text x="145" y="291" text-anchor="middle" fill="#6b7280" font-size="11">app.py :5000</text>
  <text x="145" y="307" text-anchor="middle" fill="#2563eb" font-size="10">REST API + Static</text>

  <!-- Communication Layer -->
  <rect x="270" y="245" width="180" height="70" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="270" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="600">Communication Layer</text>
  <text x="360" y="286" text-anchor="middle" fill="#6b7280" font-size="11">SerialComm (USB)</text>
  <text x="360" y="302" text-anchor="middle" fill="#6b7280" font-size="11">TcpComm (WiFi :8080)</text>

  <!-- Plate Recognizer -->
  <rect x="500" y="245" width="150" height="70" rx="6" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="575" y="270" text-anchor="middle" fill="#dc2626" font-size="14">&#9889;</text>
  <text x="575" y="286" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">PlateRecognizer</text>
  <text x="575" y="302" text-anchor="middle" fill="#6b7280" font-size="11">Baidu AIP SDK</text>

  <!-- Database cylinder -->
  <ellipse cx="770" cy="262" rx="40" ry="10" fill="#003B57" stroke="#003B57" stroke-width="1.5"/>
  <rect x="730" y="262" width="80" height="35" fill="#003B57" stroke="none"/>
  <line x1="730" y1="262" x2="730" y2="297" stroke="#003B57" stroke-width="1.5"/>
  <line x1="810" y1="262" x2="810" y2="297" stroke="#003B57" stroke-width="1.5"/>
  <ellipse cx="770" cy="297" rx="40" ry="10" fill="#002a3d" stroke="#003B57" stroke-width="1.5"/>
  <text x="770" y="284" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">SQLite</text>

  <!-- Config file -->
  <rect x="850" y="255" width="50" height="50" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <path d="M 855,260 L 885,260 L 895,270 L 895,300 L 855,300 Z" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
  <path d="M 885,260 L 885,270 L 895,270" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1"/>
  <text x="875" y="290" text-anchor="middle" fill="#6b7280" font-size="9">config</text>
  <text x="875" y="300" text-anchor="middle" fill="#6b7280" font-size="9">.json</text>

  <!-- Internal labels -->
  <rect x="290" y="330" width="140" height="22" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="360" y="345" text-anchor="middle" fill="#6b7280" font-size="10">Binary Protocol: IMG_START</text>

  <rect x="480" y="330" width="30" height="22" rx="4" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="495" y="345" text-anchor="middle" fill="#dc2626" font-size="10">Lock</text>

  <rect x="560" y="330" width="90" height="22" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="605" y="345" text-anchor="middle" fill="#6b7280" font-size="10">images/ folder</text>

  <!-- Internal arrows -->
  <line x1="220" y1="280" x2="270" y2="280" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="450" y1="280" x2="500" y2="280" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="650" y1="280" x2="730" y2="280" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Arrow: Server -> ESP32 -->
  <line x1="360" y1="355" x2="360" y2="400" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="370" y="382" fill="#9333ea" font-size="10">Serial / TCP</text>

  <!-- ==================== Layer 3: ESP32 Hardware ==================== -->
  <rect x="40" y="400" width="440" height="130" rx="10" fill="#faf5ff" fill-opacity="0.3" stroke="#e9d5ff" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="56" y="417" fill="#9333ea" font-size="10" font-weight="600" letter-spacing="0.06em">ESP32-S3 HARDWARE</text>

  <!-- ESP32 chip -->
  <rect x="70" y="430" width="140" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="458" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">ESP32-S3</text>
  <text x="140" y="474" text-anchor="middle" fill="#6b7280" font-size="11">PSRAM (OPI)</text>
  <text x="140" y="490" text-anchor="middle" fill="#6b7280" font-size="10">arduino-cli build</text>

  <!-- Camera -->
  <rect x="260" y="430" width="100" height="80" rx="8" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="458" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">OV2640</text>
  <text x="310" y="474" text-anchor="middle" fill="#6b7280" font-size="11">Camera</text>
  <text x="310" y="490" text-anchor="middle" fill="#6b7280" font-size="10">VGA 640x480</text>

  <!-- Flash LED -->
  <rect x="400" y="430" width="60" height="80" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="430" y="464" text-anchor="middle" fill="#ea580c" font-size="18">&#9889;</text>
  <text x="430" y="484" text-anchor="middle" fill="#6b7280" font-size="10">Flash</text>
  <text x="430" y="496" text-anchor="middle" fill="#6b7280" font-size="9">GPIO 47</text>

  <!-- ESP32 -> Camera -->
  <line x1="210" y1="470" x2="260" y2="470" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- ==================== External: Baidu Cloud ==================== -->
  <rect x="560" y="400" width="360" height="130" rx="10" fill="#fef2f2" fill-opacity="0.3" stroke="#fecaca" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="576" y="417" fill="#dc2626" font-size="10" font-weight="600" letter-spacing="0.06em">EXTERNAL SERVICE</text>

  <rect x="590" y="430" width="160" height="80" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="458" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Baidu Cloud OCR</text>
  <text x="670" y="474" text-anchor="middle" fill="#6b7280" font-size="11">licensePlate API</text>
  <text x="670" y="490" text-anchor="middle" fill="#dc2626" font-size="10">Plate + Color + Score</text>

  <!-- Cloud icon -->
  <text x="820" y="460" text-anchor="middle" fill="#dc2626" font-size="30">&#9729;</text>
  <text x="820" y="486" text-anchor="middle" fill="#6b7280" font-size="10">Cloud API</text>

  <!-- Arrow: Server -> Baidu Cloud -->
  <line x1="575" y1="315" x2="670" y2="430" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <rect x="590" y="362" width="60" height="18" rx="3" fill="#ffffff" opacity="0.95"/>
  <text x="620" y="375" text-anchor="middle" fill="#dc2626" font-size="10">JPEG image</text>

  <!-- ==================== Deployment Layer ==================== -->
  <rect x="40" y="555" width="880" height="100" rx="10" fill="#fff7ed" fill-opacity="0.3" stroke="#fed7aa" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="56" y="572" fill="#ea580c" font-size="10" font-weight="600" letter-spacing="0.06em">DEPLOYMENT (Build Tools)</text>

  <!-- Deploy GUI -->
  <rect x="70" y="585" width="140" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="608" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Deploy GUI</text>
  <text x="140" y="624" text-anchor="middle" fill="#6b7280" font-size="11">PySide6 (Qt)</text>

  <!-- PyInstaller -->
  <rect x="260" y="585" width="140" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="608" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">PyInstaller</text>
  <text x="330" y="624" text-anchor="middle" fill="#6b7280" font-size="11">deploy.exe</text>

  <!-- Embedded Python -->
  <rect x="450" y="585" width="140" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="520" y="608" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">Embedded Python</text>
  <text x="520" y="624" text-anchor="middle" fill="#6b7280" font-size="11">3.10.11 + wheels</text>

  <!-- esptool -->
  <rect x="640" y="585" width="120" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="700" y="608" text-anchor="middle" fill="#111827" font-size="13" font-weight="600">esptool</text>
  <text x="700" y="624" text-anchor="middle" fill="#6b7280" font-size="11">Firmware Flash</text>

  <!-- arduino-cli -->
  <rect x="810" y="585" width="90" height="55" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="855" y="608" text-anchor="middle" fill="#111827" font-size="12" font-weight="600">arduino-cli</text>
  <text x="855" y="624" text-anchor="middle" fill="#6b7280" font-size="10">Build FW</text>

  <!-- Deploy arrows -->
  <line x1="210" y1="612" x2="260" y2="612" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="400" y1="612" x2="450" y2="612" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <line x1="590" y1="612" x2="640" y2="612" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ==================== Legend ==================== -->
  <g transform="translate(50, 680)">
    <line x1="0" y1="8" x2="24" y2="8" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
    <text x="30" y="12" fill="#6b7280" font-size="11">HTTP Request</text>
    <line x1="130" y1="8" x2="154" y2="8" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-red)"/>
    <text x="160" y="12" fill="#6b7280" font-size="11">OCR API Call</text>
    <line x1="260" y1="8" x2="284" y2="8" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)"/>
    <text x="290" y="12" fill="#6b7280" font-size="11">DB Read/Write</text>
    <line x1="390" y1="8" x2="414" y2="8" stroke="#9333ea" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
    <text x="420" y="12" fill="#6b7280" font-size="11">Serial/TCP Comm</text>
    <line x1="540" y1="8" x2="564" y2="8" stroke="#ea580c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
    <text x="570" y="12" fill="#6b7280" font-size="11">Build Pipeline</text>
  </g>

</svg>